# https://help.github.com/en/categories/automating-your-workflow-with-github-actions

# file-version: 1.0

name: "Continuous Integration"

on:
  - pull_request
  - push

permissions:
  contents: read
  security-events: read
  issues: read
  pull-requests: read
  checks: read

concurrency:
  group: "${{ github.event_name }}-${{ github.workflow }}-${{ github.head_ref || github.run_id }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  validate-all:
    name: "Validate Project"

    uses: "mimmi20/ci/.github/workflows/validate-all.yml@8.4"
    with:
      skip-validate-yaml: false
      skip-validate-md: false

  validate-php:
    name: "Validate PHP"

    uses: "mimmi20/ci/.github/workflows/validate-php.yml@8.4"
    with:
      extensions: "ctype, curl, dom, fileinfo, iconv, intl, mbstring, simplexml, tokenizer, xml, xmlwriter"
      ini-values: "opcache.enable=1, opcache.fast_shutdown=0, zend.assertions=1, assert.exception=On, intl.default_locale=de, intl.use_exceptions=1, zend.exception_ignore_args=0"
      composer-options: "--optimize-autoloader --prefer-dist --prefer-stable -v"
      skip-validate-composer: false
      skip-phplint: false
      skip-check-composer: false
      skip-ec-checker: false
      dependency-analyser-options: "--ignore-dev-in-prod-deps --ignore-unknown-classes"

  install-php:
    name: "Install Project"

    needs:
      - "validate-all"
      - "validate-php"

    uses: "mimmi20/ci/.github/workflows/install-php.yml@8.4"
    with:
      extensions: "ctype, curl, dom, fileinfo, iconv, mbstring, intl, simplexml, tokenizer, xml, xmlwriter"
      ini-values: "opcache.enable=1, opcache.fast_shutdown=0, zend.assertions=1, assert.exception=On, intl.default_locale=de, intl.use_exceptions=1, zend.exception_ignore_args=0"
      composer-options: "--optimize-autoloader --prefer-dist --prefer-stable -v"
      skip-librabbitmq-install: true
      skip-libgif-install: true

  install-node:
    name: "Install Project"

    needs:
      - "validate-all"
      - "validate-php"

    uses: "mimmi20/ci/.github/workflows/install-node.yml@8.4"
    with:
      skip-nasm-install: false
      skip-libimagequant-install: false
      skip-libpng-install: true
      skip-librabbitmq-install: false
      skip-libgif-install: false

  analytics-php:
    name: "Project Analysis"

    permissions:
      security-events: write
      id-token: write
      contents: read
      issues: read
      pull-requests: read
      checks: read

    needs:
      - "install-php"
      - "install-node"

    uses: "mimmi20/ci/.github/workflows/analytics-php.yml@8.4"
    with:
      extensions: "ctype, curl, dom, fileinfo, iconv, intl, mbstring, simplexml, tokenizer, xml, xmlwriter"
      ini-values: "opcache.enable=1, opcache.fast_shutdown=0, zend.assertions=1, assert.exception=On, intl.default_locale=de, intl.use_exceptions=1, zend.exception_ignore_args=0"
      composer-options: "--optimize-autoloader --prefer-dist --prefer-stable -v"
      skip-php-cs-fixer: false
      skip-phpcs: false
      skip-phpstan: false
      skip-rector: false
      use-code-scanning: true
      phpcs-options: ""

  analytics-node:
    name: "Project Analysis"

    permissions:
      security-events: write
      id-token: write
      contents: read
      issues: read
      pull-requests: read
      checks: read

    needs:
      - "install-php"
      - "install-node"

    uses: "mimmi20/ci/.github/workflows/analytics-node.yml@8.4"
    with:
      skip-eslint: false
      skip-stylelint: true
      skip-prettier: false
      skip-nasm-install: false
      skip-libimagequant-install: false
      skip-libpng-install: true
      skip-librabbitmq-install: false
      skip-libgif-install: false
      skip-oxlint: true

  tests-php:
    name: "UnitTests PHP"

    needs:
      - "analytics-php"
      - "analytics-node"

    uses: "mimmi20/ci/.github/workflows/test-php.yml@8.4"
    with:
      extensions: "ctype, dom, fileinfo, intl, simplexml, tokenizer, xml, xmlwriter"
      ini-values: "opcache.enable=1, opcache.fast_shutdown=0, zend.assertions=1, assert.exception=On, intl.default_locale=de, intl.use_exceptions=1, zend.exception_ignore_args=0"
      coverage: "xdebug"
      composer-options: "--optimize-autoloader --prefer-dist --prefer-stable -v"
      test-name: ""
      min-msi: 0
      min-covered-msi: 0
      skip-librabbitmq-install: true
      skip-libgif-install: true
      upload-codecov: true
      upload-codeclimate: false
      upload-coveralls: true
      upload-flag: ""
      use-phpstan: true
    secrets:
      ENV_CODECLIMATE_API_KEY: ${{ secrets.CODECLIMATE_API_KEY }}
      ENV_CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      ENV_STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}

  tests-node:
    name: "UnitTests Node"

    needs:
      - "analytics-php"
      - "analytics-node"

    uses: "mimmi20/ci/.github/workflows/test-node.yml@master"
    with:
      coverage: "xdebug"
      test-name: ""
      skip-vitest: false
      skip-stryker: true
      skip-nasm-install: false
      skip-libimagequant-install: false
      skip-libpng-install: true
      skip-librabbitmq-install: false
      skip-libgif-install: false
      upload-codecov: true
      upload-codeclimate: false
      upload-coveralls: true
      upload-flag: ""
    secrets:
      ENV_CODECLIMATE_API_KEY: ${{ secrets.CODECLIMATE_API_KEY }}
      ENV_CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      ENV_STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}

  build-with-vite:
    name: "Build with vite"

    needs:
      - "tests-php"
      - "tests-node"

    runs-on: "${{ matrix.operating-system }}"

    timeout-minutes: 10

    continue-on-error: false

    strategy:
      fail-fast: false

      matrix:
        operating-system:
          - "ubuntu-latest"

        node-version:
          - "22"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v6"
        with:
          # Disabling shallow clone is recommended for improving relevancy of reporting
          fetch-depth: 0
          lfs: false
          persist-credentials: false

      - name: "Set up NASM (for imagemin binary builds)"
        uses: "ilammy/setup-nasm@v1"

      - name: "install libimagequant-dev"
        run: "sudo apt-get install libimagequant-dev -y"

      - name: "install libpng-dev"
        run: "sudo apt-get install libpng-dev -y"
        continue-on-error: true

      - name: "install librabbitmq-dev"
        run: "sudo apt-get install librabbitmq-dev -y"

      - name: "install libgif-dev"
        run: "sudo apt-get install libgif-dev"

      - name: "Use Node.js ${{ matrix.node-version }}"
        uses: "actions/setup-node@v6"
        with:
          node-version: "${{ matrix.node-version }}"

      - name: "install dependencies"
        run: "npm install"

      - name: "build"
        run: "npm run build"

  # This is a meta job to avoid to have to constantly change the protection rules
  # whenever we touch the matrix.
  tests-status:
    name: "CI Status"

    runs-on: "ubuntu-latest"

    if: always()

    needs:
      - "tests-php"
      - "tests-node"
      - "build-with-vite"

    steps:
      - name: Failing run
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'skipped') || contains(needs.*.result, 'cancelled') }}
        run: exit 1

      - name: Successful run
        if: ${{ !(contains(needs.*.result, 'failure')) && !(contains(needs.*.result, 'skipped')) && !(contains(needs.*.result, 'cancelled')) }}
        run: exit 0
